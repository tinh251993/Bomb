<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Bomb Online</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      color: #f8fafc;
      background: #061524 url("res/background_Menu.png") center / cover no-repeat fixed;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      content: "";
      background:
        linear-gradient(90deg, rgba(2, 6, 23, 0.86), rgba(3, 37, 65, 0.68)),
        radial-gradient(circle at 72% 18%, rgba(250, 204, 21, 0.18), transparent 30%);
      pointer-events: none;
    }

    main {
      position: relative;
      display: grid;
      min-height: 100vh;
      grid-template-columns: minmax(320px, 520px) 1fr;
      gap: 44px;
      align-items: center;
      padding: 48px clamp(24px, 6vw, 84px);
    }

    .panel {
      padding: 34px;
      background: rgba(7, 17, 31, 0.82);
      border: 3px solid rgba(56, 189, 248, 0.68);
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #fde68a;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(44px, 7vw, 82px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .copy {
      max-width: 460px;
      margin: 0 0 28px;
      color: #cbd5e1;
      font-size: 19px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .button {
      display: inline-flex;
      min-width: 184px;
      min-height: 56px;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      border: 3px solid #bbf7d0;
      border-radius: 8px;
      color: #f8fafc;
      background: #16a34a;
      font-size: 19px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 7px 0 rgba(2, 6, 23, 0.45);
    }

    .button.secondary {
      border-color: #93c5fd;
      background: #0f172a;
    }

    .fighters {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 18px;
      align-items: end;
    }

    .fighter {
      display: grid;
      min-height: 244px;
      align-content: end;
      justify-items: center;
      padding: 18px 14px;
      border: 3px solid rgba(51, 65, 85, 0.9);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.78);
    }

    .fighter.featured {
      min-height: 282px;
      border-color: #facc15;
      background: rgba(31, 41, 55, 0.84);
    }

    .fighter img {
      width: min(156px, 100%);
      height: auto;
      object-fit: contain;
      image-rendering: auto;
    }

    .fighter span {
      margin-top: 12px;
      color: #f8fafc;
      font-size: 18px;
      font-weight: 800;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 24px 16px 32px;
      }

      .panel {
        padding: 24px;
      }

      .fighters {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .fighter,
      .fighter.featured {
        min-height: 180px;
      }

      .fighter span {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <p class="eyebrow">Solo mode</p>
      <h1>Bomb Online</h1>
      <p class="copy">Chọn chiến binh, chọn loại bom và vượt qua các bản đồ pirate, forest cùng boss mới.</p>
      <div class="actions">
        <a class="button" href="phaser3/?play=1">Vào game</a>
        <a class="button secondary" href="age-war/">Age Battle</a>
        <a class="button secondary" href="phaser3/map-editor.html">Map Editor</a>
      </div>
    </section>

    <section class="fighters" aria-label="Characters">
      <div class="fighter">
        <img src="res/User/opbebong.png" alt="Be Bong">
        <span>Be Bong</span>
      </div>
      <div class="fighter featured">
        <img src="res/User/opkhokho.png" alt="Kho Kho">
        <span>Kho Kho</span>
      </div>
      <div class="fighter">
        <img src="res/User/optiachop.png" alt="Tia Chop">
        <span>Tia Chop</span>
      </div>
    </section>
  </main>
</body>
</html>
