<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bomb Online - Phaser 3</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <a class="map-editor-link" href="map-editor.html">Map Editor</a>
  <div id="game"></div>
  <div id="mobile-controls" class="mobile-controls" aria-label="Mobile controls">
    <div class="mobile-dpad" aria-label="Move controls">
      <button class="mobile-control mobile-up" type="button" data-mobile-action="up" aria-label="Move up">▲</button>
      <button class="mobile-control mobile-left" type="button" data-mobile-action="left" aria-label="Move left">◀</button>
      <button class="mobile-control mobile-right" type="button" data-mobile-action="right" aria-label="Move right">▶</button>
      <button class="mobile-control mobile-down" type="button" data-mobile-action="down" aria-label="Move down">▼</button>
    </div>
    <button class="mobile-control mobile-bomb" type="button" data-mobile-action="bomb" aria-label="Place bomb">BOMB</button>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
