<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bomb Online - Map Editor</title>
  <link rel="stylesheet" href="src/map-editor.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Map Editor</h1>
        <p>26 x 13 layout for TileMap.js</p>
      </div>
      <a href="index.html">Back to game</a>
    </header>

    <section class="toolbar" aria-label="Tile tools">
      <button class="tool active" data-tile="."><span class="swatch floor"></span>Floor</button>
      <button class="tool" data-tile="#"><span class="swatch wall"></span>Wall</button>
      <button class="tool" data-tile="C"><span class="swatch crate"></span>Box</button>
      <button class="tool" data-tile="W"><span class="swatch water"></span>Water</button>
      <button class="object-tool" id="place-enemy" data-object-tool="enemy">Place Enemy</button>
      <button class="object-tool" id="place-boss" data-object-tool="boss">Place Boss</button>
      <button class="object-tool" id="erase-object" data-object-tool="erase">Erase Object</button>
    </section>

    <section class="workspace">
      <div class="board-wrap">
        <div id="board" class="board" aria-label="Map grid"></div>
      </div>

      <aside class="panel">
        <section class="asset-gallery" aria-label="Game assets">
          <h2>Assets</h2>
          <div class="asset-grid">
            <figure><img src="../res/land.png" alt="Floor"><figcaption>Floor</figcaption></figure>
            <figure><img src="../res/boxcot.png" alt="Wall"><figcaption>Wall</figcaption></figure>
            <figure><img src="../res/boxgo3.png" alt="Box"><figcaption>Box</figcaption></figure>
            <figure><img src="../res/snow.png" alt="Water"><figcaption>Water</figcaption></figure>
            <figure><img src="../res/quaivat 3_down.png" alt="Pirate enemy"><figcaption>Enemy</figcaption></figure>
            <figure><img src="../res/quaivat3new_down.png" alt="Forest enemy"><figcaption>Forest</figcaption></figure>
            <figure><img src="../res/Boss/boss_allmode_down.png" alt="Boss"><figcaption>Boss</figcaption></figure>
            <figure><img src="../res/items/item_bomb.gif" alt="Bomb item"><figcaption>Item</figcaption></figure>
          </div>
        </section>

        <section class="upload-panel" aria-label="Upload assets">
          <h2>Upload PNG/GIF</h2>
          <input id="asset-upload" type="file" accept="image/png,image/gif" multiple>
          <div id="uploaded-assets" class="uploaded-assets"></div>
        </section>

        <section class="save-panel" aria-label="Save map">
          <h2>Save Map</h2>
          <div class="save-fields">
            <label for="map-type">Loại map</label>
            <select id="map-type">
              <option value="pirate">pirate</option>
              <option value="forest">forest</option>
            </select>

            <label for="map-name">Tên map</label>
            <input id="map-name" type="text" value="pirate1" placeholder="pirate1, forest1">
          </div>
          <button id="save-map" class="wide-action">Save Map</button>
          <div id="saved-maps" class="saved-maps"></div>
        </section>

        <div class="actions">
          <button id="fill-border">Fill Border</button>
          <button id="clear-map">Clear</button>
          <button id="random-boxes">Random Boxes</button>
          <button id="copy-layout">Copy Layout</button>
          <button id="import-layout">Import Layout</button>
        </div>

        <label for="layout-output">Layout</label>
        <textarea id="layout-output" spellcheck="false"></textarea>
        <p id="status" class="status">Ready.</p>
      </aside>
    </section>
  </main>

  <script type="module" src="src/map-editor.js"></script>
</body>
</html>
